<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeeKota House Robbery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app hidden" aria-hidden="true">
        <div class="shell">
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-mark">ZK</div>
                    <div>
                        <strong>ZeeKota House Robbery</strong>
                        <span>ZeeKota</span>
                    </div>
                </div>

                <nav id="tabs" class="tabs"></nav>

                <button id="closeBtn" class="icon-button" title="Close">
                    <span>Esc</span>
                </button>
            </aside>

            <main class="main">
                <header class="topbar">
                    <div>
                        <p class="eyebrow">ZeeKota operations</p>
                        <h1 id="viewTitle">Dashboard</h1>
                    </div>
                    <div id="activeStrip" class="active-strip"></div>
                </header>

                <section id="content" class="content"></section>
            </main>
        </div>
    </div>

    <div id="minigame" class="minigame hidden">
        <div class="keypad-shell">
            <div class="keypad-header">
                <div>
                    <p class="eyebrow">Keypad bypass</p>
                    <h2>Digital Entry</h2>
                </div>
                <span id="miniTier" class="pill">Tier 1</span>
            </div>
            <div class="timer-track"><span id="timerBar"></span></div>
            <div class="sequence" id="sequence"></div>
            <div class="mini-status">
                <span id="miniAttempt">Attempt 1/1</span>
                <strong id="miniReadout">Awaiting input</strong>
            </div>
            <div id="keypadGrid" class="keypad-grid"></div>
        </div>
    </div>

    <div id="toasts" class="toasts"></div>
    <div id="screenPrompt" class="screen-prompt" aria-hidden="true">
        <span id="promptKey" class="prompt-key">E</span>
        <span id="promptMessage" class="prompt-message">Press E to Open ZeeKota Menu</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
